version: '3.9'

services:
  # ─────────────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: quick_style_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - quick_style_net

  # ─────────────────────────────────────────────
  # React Vite Frontend Dev Server
  # ─────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: quick_style_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development
    networks:
      - quick_style_net

  # ─────────────────────────────────────────────
  # FastAPI Python Backend
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quick_style_backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=${REDIS_URL}
      - GOOGLE_MAPS_KEY=${GOOGLE_MAPS_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - WHATSAPP_TOKEN=${WHATSAPP_TOKEN}
      - SECRET_KEY=${SECRET_KEY}
      - ENV=development
    depends_on:
      - mongodb
      - redis
    networks:
      - quick_style_net
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ─────────────────────────────────────────────
  # MongoDB Database
  # ─────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: quick_style_mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=quick_style_secret
      - MONGO_INITDB_DATABASE=quick_style_db
    volumes:
      - mongo_data:/data/db
    networks:
      - quick_style_net

  # ─────────────────────────────────────────────
  # Redis Cache + Pub/Sub
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: quick_style_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - quick_style_net

# ─────────────────────────────────────────────
volumes:
  mongo_data:
  redis_data:

networks:
  quick_style_net:
    driver: bridge
